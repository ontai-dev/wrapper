---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: packoperationresults.infrastructure.ontai.dev
spec:
  group: infrastructure.ontai.dev
  names:
    kind: PackOperationResult
    listKind: PackOperationResultList
    plural: packoperationresults
    shortNames:
    - por
    singular: packoperationresult
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.capability
      name: Capability
      type: string
    - jsonPath: .spec.status
      name: Status
      type: string
    - jsonPath: .spec.targetClusterRef
      name: Cluster
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PackOperationResult is the immutable result record written by the Conductor
          execute-mode Job after a pack-deploy capability completes. It replaces the
          ConfigMap output channel, providing a versioned, richly-typed CR that the
          wrapper PackExecutionReconciler reads to advance PackExecution status and
          that the lineagesink can consume as additional data. One PackOperationResult
          per PackExecution, created in namespace seam-tenant-{clusterName}.
          seam-core-schema.md §8, Decision 11.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PackOperationResultSpec is the complete result document written by the
              Conductor execute-mode Job before exit. Written by conductor; read by wrapper.
              seam-core-schema.md §8, Decision 11.
            properties:
              artifacts:
                description: Artifacts is the list of artifacts produced by this execution.
                items:
                  description: |-
                    PackOperationArtifact is a structured reference to an artifact produced
                    by a pack-deploy execution. Never contains raw artifact content.
                  properties:
                    checksum:
                      description: 'Checksum is the content-addressed checksum. Format:
                        sha256:<hex>.'
                      type: string
                    kind:
                      description: 'Kind declares the artifact type. One of: ConfigMap,
                        Secret, OCIImage, S3Object.'
                      enum:
                      - ConfigMap
                      - Secret
                      - OCIImage
                      - S3Object
                      type: string
                    name:
                      description: Name is a logical identifier for this artifact.
                      type: string
                    reference:
                      description: Reference is the fully qualified reference for
                        the artifact kind.
                      type: string
                  required:
                  - kind
                  - name
                  - reference
                  type: object
                type: array
              capability:
                description: Capability is the name of the Conductor capability that
                  produced this result.
                type: string
              clusterPackRef:
                description: ClusterPackRef is the name of the ClusterPack CR that
                  was deployed.
                type: string
              completedAt:
                description: CompletedAt is the time the capability execution finished.
                format: date-time
                type: string
              deployedResources:
                description: |-
                  DeployedResources is the list of Kubernetes resources applied during this
                  execution. Populated by pack-deploy on success. Used by PackInstanceReconciler
                  for deletion cleanup.
                items:
                  description: |-
                    PackOperationDeployedResource records a single Kubernetes resource applied
                    during a pack-deploy execution.
                  properties:
                    apiVersion:
                      description: APIVersion is the Kubernetes apiVersion (e.g.,
                        apps/v1, v1).
                      type: string
                    kind:
                      description: Kind is the Kubernetes resource Kind (e.g., Deployment,
                        Namespace).
                      type: string
                    name:
                      description: Name is the resource name.
                      type: string
                    namespace:
                      description: Namespace is the resource namespace. Empty for
                        cluster-scoped resources.
                      type: string
                  required:
                  - apiVersion
                  - kind
                  - name
                  type: object
                type: array
              failureReason:
                description: FailureReason is populated when Status is Failed. Nil
                  on success.
                properties:
                  category:
                    description: Category classifies the failure domain.
                    enum:
                    - ValidationFailure
                    - CapabilityUnavailable
                    - ExecutionFailure
                    - ExternalDependencyFailure
                    - InvariantViolation
                    - LicenseViolation
                    - StorageUnavailable
                    type: string
                  failedStep:
                    description: FailedStep is the name of the step that failed. Empty
                      for single-step capabilities.
                    type: string
                  reason:
                    description: Reason is a human-readable description of the specific
                      failure.
                    type: string
                required:
                - category
                - reason
                type: object
              packExecutionRef:
                description: PackExecutionRef is the name of the PackExecution CR
                  that triggered this operation.
                type: string
              phase:
                description: Phase identifies the RunnerConfig phase this result belongs
                  to.
                type: string
              previousRevisionRef:
                description: |-
                  PreviousRevisionRef is the name of the PackOperationResult CR deleted when
                  this revision was written. Enables chain reconstruction for the full operation history.
                  Absent for revision 1 (no predecessor).
                type: string
              revision:
                description: |-
                  Revision is the monotonically increasing revision counter for this pack operation
                  sequence. Incremented each time a new result supersedes the previous one.
                format: int64
                type: integer
              startedAt:
                description: StartedAt is the time the capability execution began.
                format: date-time
                type: string
              status:
                allOf:
                - enum:
                  - Succeeded
                  - Failed
                - enum:
                  - Succeeded
                  - Failed
                description: Status is the terminal status of the capability execution.
                type: string
              steps:
                description: Steps contains individual step results for multi-step
                  capabilities.
                items:
                  description: |-
                    PackOperationStepResult is the execution result for one step within a
                    multi-step capability.
                  properties:
                    completedAt:
                      description: CompletedAt is the time this step finished execution.
                      format: date-time
                      type: string
                    message:
                      description: Message provides additional context about the step
                        outcome.
                      type: string
                    name:
                      description: Name is the step identifier within the capability.
                      type: string
                    startedAt:
                      description: StartedAt is the time this step began execution.
                      format: date-time
                      type: string
                    status:
                      allOf:
                      - enum:
                        - Succeeded
                        - Failed
                      - enum:
                        - Succeeded
                        - Failed
                      description: Status is the terminal status of this step.
                      type: string
                  required:
                  - name
                  - status
                  type: object
                type: array
              talosClusterOperationResultRef:
                description: |-
                  TalosClusterOperationResultRef is reserved for future cross-reference to a
                  TalosCluster-scoped OperationResult. Stub field; not populated by any current controller.
                type: string
              targetClusterRef:
                description: TargetClusterRef is the name of the target cluster this
                  operation ran against.
                type: string
            required:
            - capability
            - status
            type: object
          status:
            description: |-
              PackOperationResultStatus is the observed state of a PackOperationResult.
              Currently empty; reserved for future controller-set conditions.
            properties:
              observedGeneration:
                description: ObservedGeneration is the last generation processed by
                  any consumer.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
