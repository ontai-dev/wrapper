    controller-gen.kubebuilder.io/version: v0.16.1
  name: infrastructurepackexecutions.infrastructure.ontai.dev
spec:
  group: infrastructure.ontai.dev
  names:
    kind: InfrastructurePackExecution
    listKind: InfrastructurePackExecutionList
    plural: infrastructurepackexecutions
    shortNames:
    - ipe
    singular: infrastructurepackexecution
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterPackRef.name
      name: Pack
      type: string
    - jsonPath: .spec.targetClusterRef
      name: Target
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InfrastructurePackExecution is the seam-core CRD for a runtime pack delivery request.
          wrapper-schema.md §3.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InfrastructurePackExecutionSpec defines the desired state of an InfrastructurePackExecution.
              wrapper-schema.md §3.
            properties:
              admissionProfileRef:
                description: AdmissionProfileRef is the name of the RBACProfile governing
                  this execution.
                type: string
              chartName:
                description: ChartName is the Helm chart name. Carried from ClusterPack.
                type: string
              chartURL:
                description: ChartURL is the Helm chart repository URL. Carried from
