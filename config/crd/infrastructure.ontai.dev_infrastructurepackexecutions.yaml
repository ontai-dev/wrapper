                type: string
              observedGeneration:
                description: ObservedGeneration is the generation most recently reconciled.
                format: int64
                type: integer
              operationResultRef:
                description: |-
                  OperationResultRef is the name of the PackOperationResult CR written after
                  successful pack-deploy Job completion.
                type: string
            type: object
