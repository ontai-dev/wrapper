---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: clusterpacks.infra.ontai.dev
spec:
  group: infra.ontai.dev
  names:
    kind: ClusterPack
    listKind: ClusterPackList
    plural: clusterpacks
    shortNames:
    - cp
    singular: clusterpack
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.signed
      name: Signed
      type: boolean
    - jsonPath: .status.conditions[?(@.type=="Available")].status
      name: Available
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterPack is the primary pack registration resource for the infra.ontai.dev API group.
          It records an OCI artifact that has been compiled (off-cluster) and is ready for
          runtime delivery. Once registered, ClusterPack spec is immutable. Changes require
          creating a new ClusterPack. CI-INV-002, wrapper-schema.md §3.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ClusterPackSpec defines the desired state of a ClusterPack.
              All fields except lineage are immutable after creation. CI-INV-002.
              wrapper-schema.md §3.
            properties:
              basePackName:
                description: |-
                  BasePackName is the logical pack name shared across versions (e.g., "nginx-ingress").
                  Separate from the versioned CR name (e.g., "nginx-ingress-v4.9.0-r1"). When set,
                  PackInstances are named {basePackName}-{clusterName} so that a newer version of the
                  same base pack supersedes an older one in-place rather than creating a parallel
                  PackInstance. Schema-first per Decision 11.
                type: string
              chartName:
                description: |-
                  ChartName is the name of the Helm chart (e.g., "nginx-ingress").
                  Populated by the Compiler for helm category packs. Absent for kustomize and raw.
                  Decision B, T-04 schema.
                type: string
              chartURL:
                description: |-
                  ChartURL is the URL of the Helm chart repository used to compile this ClusterPack.
                  Populated by the Compiler for helm category packs. Absent for kustomize and raw.
                  Decision B, T-04 schema.
                type: string
              chartVersion:
                description: |-
                  ChartVersion is the version of the Helm chart used to compile this ClusterPack.
                  Populated by the Compiler for helm category packs. Absent for kustomize and raw.
                  Decision B, T-04 schema.
                type: string
              checksum:
                description: |-
                  Checksum is the SHA256 checksum of the pack artifact, used for integrity
                  verification before deployment. Immutable after creation.
                minLength: 1
                type: string
              clusterScopedDigest:
                description: |-
                  ClusterScopedDigest is the OCI digest of the cluster-scoped non-RBAC layer.
                  Contains MutatingWebhookConfiguration, ValidatingWebhookConfiguration,
                  CustomResourceDefinition, APIService, PriorityClass, StorageClass,
                  IngressClass, ClusterIssuer, and similar cluster-scoped resources.
                  Applied after guardian RBAC intake and before workload manifests.
                  Absent when the chart has no cluster-scoped resources. wrapper-schema.md §4.
                type: string
              executionOrder:
                description: |-
                  ExecutionOrder defines the ordered stages in which pack manifests are applied.
                  Stages must be: rbac, storage, stateful, stateless (in that order when present).
                  Immutable after creation.
                items:
                  description: |-
                    ExecutionStage represents a single stage in the pack execution order.
                    wrapper-schema.md §3 ClusterPack spec.executionOrder.
                  properties:
                    manifests:
                      description: Manifests is the list of manifest names to apply
                        in this stage.
                      items:
                        type: string
                      type: array
                    name:
                      description: 'Name is the stage name. Must be one of: rbac,
                        storage, stateful, stateless.'
                      enum:
                      - rbac
                      - storage
                      - stateful
                      - stateless
                      type: string
                  required:
                  - name
                  type: object
                type: array
              helmVersion:
                description: |-
                  HelmVersion is the version of the Helm SDK used to render this ClusterPack.
                  Records the helm.sh/helm/v3 module version embedded in the Compiler binary.
                  Ensures rendering reproducibility across SDK versions.
                  Populated by the Compiler for helm category packs. Absent for kustomize and raw.
                  Decision B, T-04 schema.
                type: string
              lifecyclePolicies:
                description: LifecyclePolicies controls artifact retention behavior.
                properties:
                  retainOnDeletion:
                    default: true
                    description: |-
                      RetainOnDeletion controls whether the OCI artifact is retained when the
                      ClusterPack CR is deleted. Default: true (artifact retained).
                    type: boolean
                type: object
              lineage:
                description: |-
                  Lineage is the sealed causal chain record for this root declaration.
                  Authored once at object creation time and immutable thereafter.
                  The admission webhook rejects any update that modifies this field after creation.
                  seam-core-schema.md §5, CLAUDE.md §14 Decision 1.
                properties:
                  creatingOperator:
                    description: |-
                      CreatingOperator identifies the Seam Operator that created this object.
                      This is a structured identity carrying the operator name and its deployed
                      version at creation time.
                    properties:
                      name:
                        description: |-
                          Name is the canonical name of the Seam Operator (e.g., platform, guardian,
                          wrapper, conductor).
                        type: string
                      version:
                        description: |-
                          Version is the deployed version of the operator at the time the object was
                          created (e.g., v1.26.5-r3). This allows audit tooling to correlate objects
                          with the operator version that produced them.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  creationRationale:
                    description: |-
                      CreationRationale is the reason this object was created, drawn from the
                      Seam Core controlled vocabulary defined in rationale.go. It is not a
                      free-text field.
                    enum:
                    - ClusterProvision
                    - ClusterDecommission
                    - SecurityEnforcement
                    - PackExecution
                    - VirtualizationFulfillment
                    - ConductorAssignment
                    - VortexBinding
                    type: string
                  rootGenerationAtCreation:
                    description: |-
                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
                    format: int64
                    type: integer
                  rootKind:
                    description: |-
                      RootKind is the kind of the root declaration that caused this object to
                      exist (e.g., TalosCluster, PackExecution, RBACPolicy).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              provenance:
                description: Provenance records build-time metadata for audit and
                  traceability.
                properties:
                  buildID:
                    description: BuildID is the CI/CD build identifier that produced
                      this pack.
                    type: string
                  buildTimestamp:
                    description: BuildTimestamp is when the pack artifact was produced.
                    format: date-time
                    type: string
                  sourceRef:
                    description: SourceRef is the git reference (commit SHA or tag)
                      from which the pack was built.
                    type: string
                type: object
              rbacDigest:
                description: |-
                  RBACDigest is the OCI digest of the RBAC layer of this ClusterPack artifact.
                  Contains ServiceAccount, Role, ClusterRole, RoleBinding, ClusterRoleBinding
                  manifests extracted at compile time. Guardian /rbac-intake processes this layer
                  before workload apply proceeds. Absent on pre-split ClusterPack specs.
                  wrapper-schema.md §4.
                type: string
              registryRef:
                description: RegistryRef identifies the OCI artifact for this pack.
                  Immutable after creation.
                properties:
                  digest:
                    description: Digest is the OCI image digest (e.g., sha256:abc123...).
                      Immutable after creation.
                    type: string
                  url:
                    description: URL is the OCI registry URL including image name
                      (e.g., registry.ontai.dev/packs/my-pack).
                    type: string
                required:
                - digest
                - url
                type: object
              sourceBuildRef:
                description: |-
                  SourceBuildRef is an opaque reference to the build that produced this pack
                  (e.g., a PackBuild CR name or CI job ID). Informational only. Immutable.
                type: string
              targetClusters:
                description: |-
                  TargetClusters is the list of cluster names to which this ClusterPack should
                  be delivered. The ClusterPackReconciler creates one RunnerConfig per entry in
                  seam-tenant-{clusterName} after signing completes. wrapper-schema.md §4.
                items:
                  type: string
                type: array
              version:
                description: |-
                  Version is the semantic version of this pack. Immutable after creation.
                  Must be a valid semver string (e.g., v1.2.3).
                minLength: 1
                type: string
              workloadDigest:
                description: |-
                  WorkloadDigest is the OCI digest of the workload layer of this ClusterPack
                  artifact. Contains all non-RBAC manifests. Applied after guardian RBACProfile
                  for this pack reaches provisioned=true. Absent on pre-split ClusterPack specs.
                  wrapper-schema.md §4.
                type: string
            required:
            - checksum
            - registryRef
            - version
            type: object
          status:
            description: ClusterPackStatus defines the observed state of a ClusterPack.
            properties:
              conditions:
                description: Conditions is the list of status conditions for this
                  ClusterPack.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the generation most recently reconciled.
                format: int64
                type: integer
              packSignature:
                description: |-
                  PackSignature is the base64-encoded Ed25519 signature produced by the
                  management cluster conductor signing loop. Present only when Signed=true.
                type: string
              signed:
                description: |-
                  Signed indicates whether the conductor signing loop has signed this pack.
                  True = conductor has placed its signature annotation and updated this field.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
