---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: packexecutions.infra.ontai.dev
spec:
  group: infra.ontai.dev
  names:
    kind: PackExecution
    listKind: PackExecutionList
    plural: packexecutions
    shortNames:
    - pe
    singular: packexecution
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterPackRef.name
      name: Pack
      type: string
    - jsonPath: .spec.targetClusterRef
      name: Cluster
      type: string
    - jsonPath: .status.conditions[?(@.type=="Running")].status
      name: Running
      type: string
    - jsonPath: .status.conditions[?(@.type=="Succeeded")].status
      name: Succeeded
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PackExecution is the runtime request to apply a ClusterPack to a target cluster.
          The reconciler performs a 4-gate check before submitting a pack-deploy Job via Kueue.
          wrapper-schema.md §3.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PackExecutionSpec defines the desired state of a PackExecution.
              wrapper-schema.md §3.
            properties:
              admissionProfileRef:
                description: |-
                  AdmissionProfileRef is the name of the RBACProfile that governs this execution.
                  The 4-gate check verifies this profile has reached provisioned=true.
                minLength: 1
                type: string
              chartName:
                description: |-
                  ChartName is the name of the Helm chart being deployed.
                  Copied from the referenced ClusterPack.spec.chartName at execution time.
                  Absent for kustomize and raw category packs. Decision B, T-04 schema.
                type: string
              chartURL:
                description: |-
                  ChartURL is the URL of the Helm chart repository.
                  Copied from the referenced ClusterPack.spec.chartURL at execution time.
                  Absent for kustomize and raw category packs. Decision B, T-04 schema.
                type: string
              chartVersion:
                description: |-
                  ChartVersion is the version of the Helm chart being deployed.
                  Copied from the referenced ClusterPack.spec.chartVersion at execution time.
                  Absent for kustomize and raw category packs. Decision B, T-04 schema.
                type: string
              clusterPackRef:
                description: ClusterPackRef identifies the ClusterPack to deploy.
                properties:
                  name:
                    description: Name is the name of the ClusterPack CR.
                    minLength: 1
                    type: string
                  version:
                    description: |-
                      Version is the expected version of the ClusterPack. Used to guard against
                      race conditions where the name is reused with a different version.
                    minLength: 1
                    type: string
                required:
                - name
                - version
                type: object
              helmVersion:
                description: |-
                  HelmVersion is the version of the Helm SDK used to render the ClusterPack.
                  Copied from the referenced ClusterPack.spec.helmVersion at execution time.
                  Ensures rendering reproducibility. Absent for kustomize and raw category packs.
                  Decision B, T-04 schema.
                type: string
              lineage:
                description: |-
                  Lineage is the sealed causal chain record for this root declaration.
                  Authored once at object creation time and immutable thereafter.
                  seam-core-schema.md §5, CLAUDE.md §14 Decision 1.
                properties:
                  creatingOperator:
                    description: |-
                      CreatingOperator identifies the Seam Operator that created this object.
                      This is a structured identity carrying the operator name and its deployed
                      version at creation time.
                    properties:
                      name:
                        description: |-
                          Name is the canonical name of the Seam Operator (e.g., platform, guardian,
                          wrapper, conductor).
                        type: string
                      version:
                        description: |-
                          Version is the deployed version of the operator at the time the object was
                          created (e.g., v1.26.5-r3). This allows audit tooling to correlate objects
                          with the operator version that produced them.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  creationRationale:
                    description: |-
                      CreationRationale is the reason this object was created, drawn from the
                      Seam Core controlled vocabulary defined in rationale.go. It is not a
                      free-text field.
                    enum:
                    - ClusterProvision
                    - ClusterDecommission
                    - SecurityEnforcement
                    - PackExecution
                    - VirtualizationFulfillment
                    - ConductorAssignment
                    - VortexBinding
                    type: string
                  rootGenerationAtCreation:
                    description: |-
                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
                    format: int64
                    type: integer
                  rootKind:
                    description: |-
                      RootKind is the kind of the root declaration that caused this object to
                      exist (e.g., TalosCluster, PackExecution, RBACPolicy).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              targetClusterRef:
                description: |-
                  TargetClusterRef is the name of the TalosCluster CR that is the deployment target.
                  The cluster must be Ready before the pack-deploy Job will be admitted.
                minLength: 1
                type: string
            required:
            - admissionProfileRef
            - clusterPackRef
            - targetClusterRef
            type: object
          status:
            description: PackExecutionStatus defines the observed state of a PackExecution.
            properties:
              conditions:
                description: Conditions is the list of status conditions for this
                  PackExecution.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              jobName:
                description: |-
                  JobName is the name of the pack-deploy Kueue Job that was submitted.
                  Present after Job submission.
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation most recently reconciled.
                format: int64
                type: integer
              operationResultRef:
                description: |-
                  OperationResultRef is the name of the ConfigMap written by the conductor
                  executor after successful pack-deploy Job completion.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
