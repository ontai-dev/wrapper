---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: driftsignals.infrastructure.ontai.dev
spec:
  group: infrastructure.ontai.dev
  names:
    kind: DriftSignal
    listKind: DriftSignalList
    plural: driftsignals
    shortNames:
    - ds
    singular: driftsignal
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.state
      name: State
      type: string
    - jsonPath: .spec.correlationID
      name: CorrelationID
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DriftSignal is the seam-core CRD for the three-state drift acknowledgement chain.
          Written by conductor role=tenant; acknowledged by conductor role=management.
          Decision I. At-least-once delivery. Human-at-Boundary invariant enforced via
          configurable escalation threshold and TerminalDrift Condition. conductor-schema.md.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DriftSignalSpec defines the observed drift event written by conductor role=tenant.
              Decision I. conductor-schema.md.
            properties:
              affectedCRRef:
                description: AffectedCRRef is a typed reference to the CR that exhibited
                  drift.
                properties:
                  group:
                    description: Group is the API group of the drifted CR.
                    type: string
                  kind:
                    description: Kind is the Kind of the drifted CR.
                    type: string
                  name:
                    description: Name is the name of the drifted CR.
                    type: string
                  namespace:
                    description: Namespace is the namespace of the drifted CR. Empty
                      for cluster-scoped resources.
                    type: string
                required:
                - group
                - kind
                - name
                type: object
              correctionJobRef:
                description: |-
                  CorrectionJobRef is the name of the corrective Job created by the management cluster.
                  Populated when state transitions to queued.
                type: string
              correlationID:
                description: |-
                  CorrelationID is a unique identifier for this drift event, used to deduplicate
                  signals across federation retries. Format: UUID v4.
                type: string
              driftReason:
                description: DriftReason is a human-readable description of why drift
                  was detected.
                type: string
              escalationCounter:
                description: |-
                  EscalationCounter is the number of times this signal has been re-emitted without
                  acknowledgement. Incremented by conductor role=tenant on each re-emit cycle.
                  When this counter reaches the configurable escalation threshold, conductor writes a
                  type=TerminalDrift Condition on the affected CR and stops re-emitting. Decision I.
                format: int32
                type: integer
              observedAt:
                description: ObservedAt is the time the drift was first observed by
                  conductor role=tenant.
                format: date-time
                type: string
              state:
                allOf:
                - enum:
                  - pending
                  - delivered
                  - queued
                  - confirmed
                - enum:
                  - pending
                  - delivered
                  - queued
                  - confirmed
                description: State is the current acknowledgement state of this drift
                  signal. Decision I.
                type: string
            required:
            - affectedCRRef
            - correlationID
            - driftReason
            - observedAt
            - state
            type: object
          status:
            description: DriftSignalStatus is the observed state of a DriftSignal.
              Written by conductor role=management.
            properties:
              conditions:
                description: Conditions is the list of status conditions for this
                  DriftSignal.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the generation most recently reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
